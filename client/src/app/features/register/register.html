<section class="auth-page">

    <div class="auth-card">

        <div class="auth-header">

            <span class="tag">
                Join EcoGrid
            </span>

            <h1>
                Create Your Account
            </h1>

            <p>
                Start exploring renewable intelligence,
                climate analytics, and sustainability insights.
            </p>

        </div>

        <form class="auth-form" [formGroup]="registerForm">

            <div class="form-group">

                <label>Full Name</label>

                <input type="text" placeholder="Enter your full name" formControlName="name" name="name">

            </div>

            <div class="form-group">

                <label>Email</label>

                <input type="email" placeholder="Enter your email" formControlName="email" name="email">

            </div>

            <div class="form-group">

                <label>Password</label>

                <input type="password" placeholder="Create password" formControlName="password" name="password">

            </div>

            <div class="form-group">

                <label>Confirm Password</label>

                <input type="password" placeholder="Confirm password" formControlName="confirmPassword"
                    name="confirmPassword">

            </div>

            <button type="button" (click)="register()">
                Create Account
            </button>

        </form>

        <div class="auth-footer">

            <p>
                Already have an account?
                <a routerLink="/login">
                    Login
                </a>
            </p>

        </div>

    </div>

</section>

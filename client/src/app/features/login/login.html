<section class="auth-page">

    <div class="auth-card">

        <div class="auth-header">

            <span class="tag">
                EcoGrid Access
            </span>

            <h1>
                Welcome Back
            </h1>

            <p>
                Login to access renewable analytics,
                sustainability insights, and smart-grid intelligence.
            </p>

        </div>

        <form class="auth-form" [formGroup]="loginForm">

            <div class="form-group">

                <label>Email</label>

                <input type="email" placeholder="Enter your email" formControlName="email">

            </div>

            <div class="form-group">

                <label>Password</label>

                <input type="password" placeholder="Enter your password" formControlName="password">

            </div>

            <button type="button" (click)="login()">
                Login
            </button>

        </form>

        <div class="auth-footer">

            <p>
                Don’t have an account?
                <a routerLink="/register">
                    Create Account
                </a>
            </p>

        </div>

    </div>

</section>
